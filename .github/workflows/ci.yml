name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ---------------------------------------------------------------------------
# Python jobs
# ---------------------------------------------------------------------------
jobs:
  py-lint:
    name: "Python · Lint & Format"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - run: uv python install 3.12
      - run: uv sync --extra dev

      - name: ruff format (check)
        run: uv run ruff format --check src/ tests/

      - name: ruff lint
        run: uv run ruff check src/ tests/

  py-test:
    name: "Python · Tests (py${{ matrix.python-version }})"
    runs-on: ubuntu-latest
    needs: py-lint
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - run: uv python install ${{ matrix.python-version }}
      - run: uv sync --extra dev

      - name: Run tests with coverage
        run: |
          uv run python -m pytest tests/ \
            -v --tb=short \
            --cov=src/vibescents \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=35

      - name: Upload coverage
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 7

# ---------------------------------------------------------------------------
# Frontend jobs
# ---------------------------------------------------------------------------
  frontend-typecheck:
    name: "Frontend · TypeScript"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: bunx tsc --noEmit

  frontend-lint:
    name: "Frontend · ESLint"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint


# ---------------------------------------------------------------------------
# Security
# ---------------------------------------------------------------------------
  security:
    name: "Security · Dependency Audit"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - run: uv python install 3.12
      - run: uv sync --extra dev

      - name: Python dependency audit
        run: uv run pip-audit --format json | jq -e '.dependencies | map(.vulns) | flatten | length == 0'

# ---------------------------------------------------------------------------
# Required status check (gate for merge)
# ---------------------------------------------------------------------------
  all-checks:
    name: "All checks passed"
    runs-on: ubuntu-latest
    needs: [py-lint, py-test, frontend-typecheck, frontend-lint, security]
    if: always()
    steps:
      - name: Fail if any job failed
        run: |
          if [[ "${{ needs.py-lint.result }}" != "success" ]]; then exit 1; fi
          if [[ "${{ needs.py-test.result }}" != "success" ]]; then exit 1; fi
          if [[ "${{ needs.frontend-typecheck.result }}" != "success" ]]; then exit 1; fi
          if [[ "${{ needs.frontend-lint.result }}" != "success" ]]; then exit 1; fi
          if [[ "${{ needs.security.result }}" != "success" ]]; then exit 1; fi
          echo "All checks passed"
